# Override for a co-located API on the SAME server (same-origin: no public API domain, no CORS).
# The frontend's nginx reverse-proxies /api/ to the API container over the shared bridge network
# `pallet-packer-net` (created and owned by the API stack). VITE_API_URL=/ makes the browser issue
# relative, same-origin /api/... requests, which that proxy forwards to pallet-packer-api:8000.
#
# Prereqs: bring the API stack UP FIRST — it defines `pallet-packer-net` and the
# `pallet-packer-api` network alias, so the network must already exist. Then:
#   docker compose -f docker-compose.yml -f docker-compose.local-api.yml up -d --build
services:
  pallet-packer:
    build:
      args:
        # Same-origin: browser → /api/... → nginx proxies to pallet-packer-api:8000.
        VITE_API_URL: ${VITE_API_URL:-/}

networks:
  # Join the shared bridge the API stack created (external to this compose project).
  default:
    name: pallet-packer-net
    external: true
