server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # MANDATORY SPA deep-link fallback (D-05): a refresh on a client route such as
    # /result has no matching file on disk, so nginx must fall back to index.html.
    # Without this, deep-link refresh returns a 404 — the #1 self-host gotcha.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the content-hashed build assets (filenames change on every build,
    # so they are safe to cache immutably for a year).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
