server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API proxy: forwards /api/* to the co-located API container over the shared
    # Docker network (pallet-packer-net). Dormant for the standalone build (which talks to an
    # absolute VITE_API_URL); active only when the app is built with VITE_API_URL=/ (same-origin).
    # resolver + variable => lazy per-request DNS, so nginx still starts if the API is absent.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $api_upstream http://pallet-packer-api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # MANDATORY SPA deep-link fallback (D-05): a refresh on a client route such as
    # /result has no matching file on disk, so nginx must fall back to index.html.
    # Without this, deep-link refresh returns a 404 — the #1 self-host gotcha.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the content-hashed build assets (filenames change on every build,
    # so they are safe to cache immutably for a year).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
